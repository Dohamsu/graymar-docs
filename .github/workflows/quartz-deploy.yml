name: Deploy Quartz to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'architecture/**'
      - 'specs/**'
      - 'guides/**'
      - 'CLAUDE.md'
      - 'README.md'
      - 'quartz/**'
      - '.github/workflows/quartz-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git history for last-modified dates

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: ./quartz
        run: npm ci

      - name: Sync content + Build Quartz
        working-directory: ./quartz
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
